<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mustard Seed Gospel Church - Agbor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    /* UPDATED HERO BACKGROUND */
    .hero {
      background-image:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url('images/church1.jpg');
      background-size: cover;
      background-position: center;
    }

    .section-title {
      position: relative;
      display: inline-block;
    }

    .section-title:after {
      content: '';
      position: absolute;
      width: 60px;
      height: 3px;
      background: #b91c1c;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body class="bg-zinc-950 text-white">

  <!-- Header -->
  <header class="bg-black border-b border-red-900 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://i.imgur.com/placeholder-mustardseed.png" 
             alt="Mustard Seed Gospel Church Logo" 
             class="w-14 h-14 rounded-full object-contain bg-white p-1 border-2 border-red-500">

        <div>
          <h1 class="text-2xl font-bold tracking-tight">Mustard Seed</h1>
          <p class="text-xs text-red-400 -mt-1">GOSPEL CHURCH</p>
        </div>
      </div>

      <nav class="hidden md:flex gap-8 text-sm uppercase tracking-widest">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#events">Events</a>
        <a href="#services">Services</a>
        <a href="#livestream">Livestream</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section id="home" class="hero h-screen flex items-center">
    <div class="max-w-4xl mx-auto text-center px-6">
      <h2 class="text-5xl md:text-7xl font-bold mb-6">
        Welcome to<br>
        <span class="text-red-500">Mustard Seed Gospel Church</span>
      </h2>

      <p class="text-2xl text-gray-300 mb-8">
        Centre of Salvation • Agbor, Delta State
      </p>

      <p class="text-xl mb-10">
        "Where Faith Grows and Souls are Saved"
      </p>

      <div class="flex gap-4 justify-center">
        <a href="#events" class="bg-red-600 px-8 py-4 rounded-full font-bold">
          Join Conference
        </a>

        <a href="tel:08149960622" class="border px-8 py-4 rounded-full font-bold">
          Contact Us
        </a>
      </div>
    </div>
  </section>

</body>
</html>
